services:
  postgres:
    image: postgres:16-alpine
    container_name: taa-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tweet_accountability
    ports:
      - "5432:5432"
    volumes:
      - taa-pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taa-redis
    ports:
      - "6379:6379"
    volumes:
      - taa-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  taa-pg-data:
  taa-redis-data:
