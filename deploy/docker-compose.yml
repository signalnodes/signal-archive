# Signal Archive — VPS Docker Compose
#
# Services:
#   redis   — BullMQ state store (replaces Railway Redis)
#   chrome  — Headless Google Chrome, CDP on :9223 via chrome-proxy.cjs
#   worker  — BullMQ workers: deletion detection, HCS attestation, severity scoring
#   ingest  — node-cron daemon: schedules browser-ingest.ts --cdp on tier schedule
#
# Run from project root:
#   docker compose -f deploy/docker-compose.yml up -d
#
# Required env vars (in .env at project root):
#   REDIS_URL, CDP_URL, DATABASE_URL, HEDERA_*, ANTHROPIC_API_KEY
#   SOCKS5_PROXY_URL — home node Tailscale SOCKS5 for residential egress (Chrome only)
#
# Chrome profile persistence:
#   The chrome-profile volume is mounted to /data/chrome-profile in the chrome service.
#   Session cookies and login state survive container restarts.
#   One-time login required on first deploy (see docs/plans/2026-03-17-vps-migration.md Task 9).

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Chrome (CDP target) ────────────────────────────────────────────────────
  # Headless Google Chrome with remote debugging port exposed to internal network.
  # Traffic egresses via SOCKS5_PROXY_URL (home node Tailscale) for residential IP.
  # Profile volume ensures session cookies survive restarts — DO NOT delete chrome-profile volume.
  chrome:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ingest
    restart: on-failure
    command: ["sh", "/app/deploy/chrome-start.sh"]
    volumes:
      - chrome-profile:/data/chrome-profile
    expose:
      - "9223"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Worker (BullMQ) ────────────────────────────────────────────────────────
  # Processes: deletion detection, HCS attestation submission, severity scoring.
  # Connects to Neon Postgres (DATABASE_URL) and VPS Redis (REDIS_URL).
  # Railway worker has been deleted — VPS worker is the sole consumer.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ingest (cron daemon) ───────────────────────────────────────────────────
  # Schedules browser-ingest.ts --cdp on a tier-based cron.
  # Connects to chrome container via CDP_URL=http://chrome:9223.
  ingest:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ingest
    restart: on-failure
    env_file: ../.env
    depends_on:
      - chrome
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Reserved slots (not yet implemented) ──────────────────────────────────
  # bonzo-agent:
  #   Built on Hedera Agent Kit framework.
  #   Add after Signal Archive hackathon submission.
  #
  # mcp-server:
  #   stdio MCP server, reads from Neon Postgres.
  #   Add when MCP work begins.

volumes:
  redis-data:
    driver: local
  chrome-profile:
    driver: local
    # Explicitly named to prevent accidental deletion.
    # Contains the X/Twitter login session — treat as sensitive persistent state.
